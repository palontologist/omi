appId: com.omi.linux.app
productName: Omi for Linux
directories:
  buildResources: resources
files:
  # Explicit default; positive patterns below would otherwise replace it.
  - '**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.ts,postcss.config.js}'
  - '!resources/win-ocr-helper/*.pdb'
  - '!resources/win-automation-helper/*.pdb'
asarUnpack:
  - resources/**
  # koffi loads its native .node at runtime, resolved relative to its own package
  # dir — it must live outside the asar archive or the foreground monitor fails.
  - node_modules/koffi/**
extraResources:
  - soul.md
# Linux-only port. Ships AppImage + deb (unconfined) — no Windows (nsis) or
# snap targets. Windows-only automation/OCR helpers are not bundled here;
# Linux uses xprop + the Tesseract-backed omi-ocr-helper instead.
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: omi
  category: Utility
  desktop:
    Name: Omi
    Comment: Omi AI companion — Linux desktop
appImage:
  artifactName: omi-linux-${version}.${ext}
npmRebuild: false
